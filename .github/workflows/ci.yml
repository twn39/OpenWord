name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    name: ${{ matrix.os }} / C++${{ matrix.cpp_std }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        cpp_std: [17]

    steps:
    - uses: actions/checkout@v4

    - name: Install System Dependencies (Linux)
      if: runner.os == 'Linux'
      run: |
        sudo apt-get update
        sudo apt-get install -y cmake g++ libxml2-dev libxslt1-dev
        
    - name: Install System Dependencies (macOS)
      if: runner.os == 'macOS'
      run: |
        brew install cmake libxml2 libxslt
        # macOS has clang by default


    - name: Install System Dependencies (Windows)
      if: runner.os == 'Windows'
      run: |
        vcpkg install libxml2 libxslt

    - name: Install Rust Toolchain
      uses: dtolnay/rust-toolchain@stable
      with:
        toolchain: stable

    - name: Build Rust Math Engine
      run: |
        cd rust_math_engine
        cargo build --release

    - name: Configure CMake
      run: >
        cmake -S . -B build 
        -DCMAKE_CXX_STANDARD=${{ matrix.cpp_std }} 
        -DCMAKE_BUILD_TYPE=Release 
        ${{ runner.os == 'Windows' && format('-DCMAKE_TOOLCHAIN_FILE={0}/scripts/buildsystems/vcpkg.cmake', env.VCPKG_INSTALLATION_ROOT) || '' }}

    - name: Build C++ Library and Executables
      run: cmake --build build --config Release -j 4

    - name: Run C++ Tests (Catch2)
      working-directory: build
      run: ctest --output-on-failure -C Release
